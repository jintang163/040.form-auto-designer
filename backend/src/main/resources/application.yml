server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: mysql

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: form-designer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.formdesigner.entity
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: form-designer

grpc:
  client:
    ai-service:
      host: localhost
      port: 50051

voice:
  asr:
    mock: true
    provider: mock
    api-key:
    secret-key:
    app-id:

clickhouse:
  url: jdbc:clickhouse://localhost:8123/form_analytics
  username: default
  password:
  driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

logging:
  level:
    root: INFO
    com.formdesigner: DEBUG
    com.formdesigner.mapper: DEBUG
